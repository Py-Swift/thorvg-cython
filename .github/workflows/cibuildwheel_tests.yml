# Build wheels with cibuildwheel on all platforms
# Validates that the pyproject.toml [tool.cibuildwheel] config is correct
#
# Triggered manually or on tagged releases.
# Wheels are uploaded as artifacts (not published to PyPI).

name: cibuildwheel tests

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-manylinux_x86_64"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-linux
        path: wheelhouse/*.whl

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-macosx_arm64 cp313-macosx_x86_64 cp313-macosx_universal2"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: wheelhouse/*.whl

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform ios --archs "arm64_iphoneos arm64_iphonesimulator x86_64_iphonesimulator" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-ios_*"

    - name: Inject xcframeworks into iOS wheels
      run: python tools/add-ios-frameworks.py wheelhouse

    - name: Test iOS wheels on Simulator
      run: python tools/ios_testbench.py test

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ios
        path: wheelhouse/*.whl

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform android --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-android_*"
        # Override pyproject.toml repair skip so default repair bundles libc++_shared.so for testing.
        CIBW_REPAIR_WHEEL_COMMAND_ANDROID: ""

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-android
        path: wheelhouse/*.whl

  build-windows-x64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-win_amd64"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-x64
        path: wheelhouse/*.whl

  build-windows-arm64:
    runs-on: windows-arm64
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-win_arm64"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-arm64
        path: wheelhouse/*.whl
