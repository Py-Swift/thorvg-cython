# Build wheels with cibuildwheel on all platforms
# Validates that the pyproject.toml [tool.cibuildwheel] config is correct
#
# Triggered manually or on tagged releases.
# Wheels are uploaded as artifacts (not published to PyPI).

name: cibuildwheel tests

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        sudo apt-get update && sudo apt-get install -y meson ninja-build

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-manylinux_x86_64"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-linux
        path: wheelhouse/*.whl

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        brew install meson
        
    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-macosx_arm64 cp313-macosx_x86_64 cp313-macosx_universal2"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: wheelhouse/*.whl

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        brew install meson
        brew install ninja

    - name: Build wheels
      run: cibuildwheel --platform ios --archs "arm64_iphoneos arm64_iphonesimulator x86_64_iphonesimulator" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-ios_*"

    - name: Inject xcframework into iOS wheels
      run: python tools/add-ios-frameworks.py wheelhouse --xcframework thorvg/output/thorvg.xcframework

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ios
        path: wheelhouse/*.whl

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        sudo apt-get update && sudo apt-get install -y meson ninja-build

    - name: Build wheels
      run: cibuildwheel --platform android --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-android_*"
        # Override pyproject.toml repair skip — bundle libc++_shared.so so
        # the cibuildwheel testbed emulator can load the extension.
        # (In production the host Gradle app provides libc++_shared.so.)
        # Can't use cibuildwheel's default repair (requires API >= 24, Python is built for 21).
        CIBW_REPAIR_WHEEL_COMMAND_ANDROID: >-
          bash -c '
          WHL="{wheel}"; DEST="{dest_dir}"; NDK="$ANDROID_NDK_HOME";
          case "$WHL" in *x86_64*) ABI=x86_64-linux-android;; *) ABI=aarch64-linux-android;; esac;
          LIBCPP="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/$ABI/libc++_shared.so";
          TMP=$(mktemp -d); python3 -m wheel unpack -d "$TMP" "$WHL";
          cp "$LIBCPP" "$TMP"/*/thorvg_cython/;
          python3 -m wheel pack -d "$DEST" "$TMP"/*/;
          rm -rf "$TMP"
          '

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-android
        path: wheelhouse/*.whl

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-win_amd64"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows
        path: wheelhouse/*.whl
