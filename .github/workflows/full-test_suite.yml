# Build wheels with cibuildwheel on all platforms, publish to PyPI,
# and attach as GitHub Release assets.
#
# Triggered manually via workflow_dispatch.
# Requires trusted publishing configured on PyPI.

name: Full Test Suite

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        sudo apt-get update && sudo apt-get install -y meson ninja-build

    - name: Build wheels
      run: cibuildwheel --platform linux --archs "x86_64 aarch64" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-linux
        path: wheelhouse/*.whl

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        brew install meson

    - name: Build wheels
      run: cibuildwheel --platform macos --archs "x86_64 arm64 universal2" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: wheelhouse/*.whl

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        brew install meson
        brew install ninja

    - name: Build wheels
      run: cibuildwheel --platform ios --archs "arm64_iphoneos arm64_iphonesimulator x86_64_iphonesimulator" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-* cp314-*"

    - name: Inject xcframeworks into iOS wheels
      run: python tools/add-ios-frameworks.py wheelhouse --xcframework thorvg/output/thorvg.xcframework --angle-dir thorvg/output/angle

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ios
        path: wheelhouse/*.whl

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: |
        uv tool install cibuildwheel
        sudo apt-get update && sudo apt-get install -y meson ninja-build

    - name: Build wheels
      run: cibuildwheel --platform android --archs "arm64_v8a x86_64" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-* cp314-*"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-android
        path: wheelhouse/*.whl

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform windows --archs "AMD64 ARM64" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows
        path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Build sdist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz
