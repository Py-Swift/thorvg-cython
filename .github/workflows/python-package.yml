# Build thorvg-cython on macOS + Windows, run tests
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Clone and build ThorVG
      run: |
        uv tool install meson
        git clone https://github.com/psychowasp/thorvg.git
        cd thorvg && bash build_all.sh

    - name: Run tests
      run: |
        THORVG_ROOT=thorvg THORVG_LIB_DIR=thorvg/output/macos_fat uv run pytest tests/ -v

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Clone and build ThorVG
      run: |
        uv tool install meson
        git clone https://github.com/psychowasp/thorvg.git
        cd thorvg && build_windows.bat

    - name: Run tests
      run: |
        $env:THORVG_ROOT="thorvg"
        $env:THORVG_LIB_DIR="thorvg\output\windows_x64"
        uv run pytest tests/ -v
