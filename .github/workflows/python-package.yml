# Build thorvg-cython on macOS + Windows, run tests
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            thorvg-build: bash build_all.sh
            thorvg-lib-dir: thorvg/output/macos_fat
          - os: windows-latest
            thorvg-build: build_windows.bat
            thorvg-lib-dir: thorvg\output\windows_x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Clone and build ThorVG
      run: |
        git clone https://github.com/psychowasp/thorvg.git
        cd thorvg && ${{ matrix.thorvg-build }}

    - name: Run tests (macOS)
      if: runner.os != 'Windows'
      run: |
        THORVG_ROOT=thorvg THORVG_LIB_DIR=${{ matrix.thorvg-lib-dir }} uv run pytest tests/ -v

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      run: |
        $env:THORVG_ROOT="thorvg"
        $env:THORVG_LIB_DIR="${{ matrix.thorvg-lib-dir }}"
        uv run pytest tests/ -v
