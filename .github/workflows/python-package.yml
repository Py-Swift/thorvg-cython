# Build thorvg-cython on macOS + Windows + Linux, run tests
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Download and build ThorVG
      env:
        THORVG_VERSION: "1.0.1"
      run: |
        uv tool install meson
        curl -sL https://github.com/thorvg/thorvg/archive/refs/tags/v${THORVG_VERSION}.tar.gz | tar xz
        mv thorvg-${THORVG_VERSION} thorvg
        python tools/build_thorvg.py macos --thorvg-root=thorvg

    - name: Run tests
      run: |
        THORVG_ROOT=thorvg THORVG_LIB_DIR=thorvg/output/macos_fat uv run pytest tests/ -v

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Download and build ThorVG
      env:
        THORVG_VERSION: "1.0.1"
      run: |
        uv tool install meson
        curl -sL https://github.com/thorvg/thorvg/archive/refs/tags/v${THORVG_VERSION}.tar.gz | tar xz
        mv thorvg-${THORVG_VERSION} thorvg
        python tools/build_thorvg.py linux --thorvg-root=thorvg

    - name: Run tests
      run: |
        THORVG_ROOT=thorvg THORVG_LIB_DIR=thorvg/output/linux_x86_64 uv run pytest tests/ -v

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Download and build ThorVG
      env:
        THORVG_VERSION: "1.0.1"
      shell: bash
      run: |
        uv tool install meson
        curl -sL https://github.com/thorvg/thorvg/archive/refs/tags/v${THORVG_VERSION}.tar.gz | tar xz
        mv thorvg-${THORVG_VERSION} thorvg
        python tools/build_thorvg.py windows --thorvg-root=thorvg

    - name: Run tests
      run: |
        $env:THORVG_ROOT="thorvg"
        $env:THORVG_LIB_DIR="thorvg\output\windows_x64"
        uv run pytest tests/ -v
