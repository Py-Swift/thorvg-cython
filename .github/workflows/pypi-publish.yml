# Build wheels with cibuildwheel on all platforms, publish to PyPI,
# and attach as GitHub Release assets.
#
# Triggered when a GitHub Release is published.
# Requires trusted publishing configured on PyPI.

name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Build wheels
      run: cibuildwheel --platform linux --archs "x86_64 aarch64" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-linux
        path: wheelhouse/*.whl

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform macos --archs "x86_64 arm64 universal2" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: wheelhouse/*.whl

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform ios --archs "arm64_iphoneos arm64_iphonesimulator x86_64_iphonesimulator" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-ios_*"

    - name: Inject xcframeworks into iOS wheels
      run: python tools/add-ios-frameworks.py wheelhouse

    - name: Test iOS wheels on Simulator
      run: python tools/ios_testbench.py test

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-ios
        path: wheelhouse/*.whl

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform android --archs "arm64_v8a x86_64" --output-dir wheelhouse
      env:
        CIBW_BUILD: "cp313-* cp314-*"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-android
        path: wheelhouse/*.whl

  build-windows-x64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform windows --archs "AMD64" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-x64
        path: wheelhouse/*.whl

  build-windows-arm64:
    runs-on: windows-arm64
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - uses: astral-sh/setup-uv@v5

    - name: Install cibuildwheel
      run: uv tool install cibuildwheel

    - name: Build wheels
      run: cibuildwheel --platform windows --archs "ARM64" --output-dir wheelhouse

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-arm64
        path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Build sdist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    needs: [build-linux, build-macos, build-ios, build-android, build-windows-x64, build-windows-arm64, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # trusted publishing to PyPI
      contents: write     # attach assets to the GitHub release

    environment:
      name: pypi

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: List collected files
      run: ls -lh dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/

    - name: Attach wheels to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
