[build-system]
requires = ["setuptools>=68", "Cython>=3.0", "ninja"]
build-backend = "setuptools.build_meta"

[project]
name = "thorvg-cython"
version = "1.0.0"
description = "Cython bindings for the ThorVG vector graphics library"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
classifiers = [
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest", "cibuildwheel", "meson", "ninja"]

# ---------------------------------------------------------------------------
#  cibuildwheel configuration
#
#  Expects a "thorvg/" directory (symlink for local dev, cloned in CI).
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "pp* *-musllinux_i686"
environment = { THORVG_ROOT = "thorvg" }


[tool.cibuildwheel.linux]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_linux.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/linux_x86_64" }

[tool.cibuildwheel.macos]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_apple.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/macos_fat", MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-all = """
    if not exist {project}\\thorvg git clone https://github.com/psychowasp/thorvg.git {project}\\thorvg
    call {project}\\tools\\thorvg_scripts\\build_windows.bat {project}\\thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/windows_x64" }

[tool.cibuildwheel.ios]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git ./thorvg
    bash ./tools/thorvg_scripts/build_apple.sh ./thorvg
"""
xbuild-tools = []
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/ios_arm64" }

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
