[build-system]
requires = ["setuptools>=68", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "thorvg-cython"
version = "0.0.1"
description = "Cython bindings for the ThorVG vector graphics library"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
classifiers = [
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest", "cibuildwheel", "meson", "ninja"]

# ---------------------------------------------------------------------------
#  cibuildwheel configuration
#
#  Expects a "thorvg/" directory (symlink for local dev, cloned in CI).
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp311-* cp312-* cp313-* cp314-*"
skip = "pp* *-musllinux_i686"
environment = { THORVG_ROOT = "thorvg" }
test-requires = ["pytest"]
test-command = "pytest {project}/tests -v"


[tool.cibuildwheel.linux]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_linux.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/linux_x86_64" }

[tool.cibuildwheel.macos]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_macos.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/macos_fat", MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-all = "{project}\\ci\\prepare_thorvg_windows.bat {project}"
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/windows_x64" }

[tool.cibuildwheel.ios]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_ios.sh {project}/thorvg
"""
xbuild-tools = ["ninja"]
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/ios_arm64" }
test-sources = ["tests"]
test-command = "python -m pytest ./tests -v"

[tool.cibuildwheel.android]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_android.sh {project}/thorvg
"""
# Bundle libc++_shared.so from the NDK into the wheel (the extension .so needs it at runtime).
# We do this manually instead of cibuildwheel's default repair to avoid other issues.
repair-wheel-command = """
    bash -c '
    WHEEL="{wheel}"
    DEST="{dest_dir}"
    NDK="${{ANDROID_NDK_HOME:-$ANDROID_NDK}}"
    ARCH=$(python3 -c "import zipfile,re,sys; z=zipfile.ZipFile(sys.argv[1]); m=re.search(r\"(x86_64|aarch64)\", \" \".join(z.namelist())); print(m.group(1) if m else \"\")" "$WHEEL")
    if [ "$ARCH" = "x86_64" ]; then
        TRIPLE="x86_64-linux-android"
    elif [ "$ARCH" = "aarch64" ]; then
        TRIPLE="aarch64-linux-android"
    fi
    LIBCPP="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/$TRIPLE/libc++_shared.so"
    if [ -f "$LIBCPP" ] && [ -n "$TRIPLE" ]; then
        TMPDIR=$(mktemp -d)
        python3 -m zipfile -e "$WHEEL" "$TMPDIR"
        PKG_DIR=$(find "$TMPDIR" -name "thorvg_cython" -type d | head -1)
        cp "$LIBCPP" "$PKG_DIR/"
        WHLNAME=$(basename "$WHEEL")
        cd "$TMPDIR" && python3 -m zipfile -c "$DEST/$WHLNAME" * && cd -
        rm -rf "$TMPDIR"
    else
        cp "$WHEEL" "$DEST/"
    fi
    '
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output" }
test-sources = ["tests"]
test-command = "python -m pytest ./tests -v"

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
