[build-system]
requires = ["setuptools>=68", "Cython>=3.0", "meson", "ninja"]
build-backend = "setuptools.build_meta"

[project]
name = "thorvg-cython"
version = "1.0.0"
description = "Cython bindings for the ThorVG vector graphics library"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
classifiers = [
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest", "cibuildwheel"]

# ---------------------------------------------------------------------------
#  cibuildwheel configuration
#
#  Expects a "thorvg/" directory (symlink for local dev, cloned in CI).
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "pp* *-musllinux_i686"
environment = { THORVG_ROOT = "thorvg" }

[tool.cibuildwheel.linux]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    cd {project}/thorvg && \
    pip install meson ninja && \
    meson setup builddir_linux --buildtype=release --default-library=static \
        -Dbindings=capi -Dloaders=svg,lottie,ttf && \
    ninja -C builddir_linux
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/builddir_linux/src" }

[tool.cibuildwheel.macos]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    cd {project}/thorvg && bash build_all.sh
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/macos_fat", MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-all = """
    if not exist {project}\\thorvg git clone https://github.com/psychowasp/thorvg.git {project}\\thorvg && \
    cd /d {project}\\thorvg && \
    pip install meson ninja && \
    meson setup builddir_win --buildtype=release --default-library=static \
        -Dbindings=capi -Dloaders=svg,lottie,ttf && \
    ninja -C builddir_win
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg\\builddir_win\\src" }

[tool.cibuildwheel.ios]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    cd {project}/thorvg && bash build_all.sh
"""
# repair-wheel-command is not executed on iOS (cross-compilation platform).
# Use tools/add-ios-frameworks.py as a post-build step instead:
#   python tools/add-ios-frameworks.py wheelhouse --xcframework thorvg/output/thorvg.xcframework
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/ios_arm64" }

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
