[build-system]
requires = ["setuptools>=68", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "thorvg-cython"
version = "0.0.2"
description = "Cython bindings for the ThorVG vector graphics library"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
classifiers = [
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest", "cibuildwheel", "meson", "ninja"]

# ---------------------------------------------------------------------------
#  cibuildwheel configuration
#
#  Expects a "thorvg/" directory (symlink for local dev, cloned in CI).
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp311-* cp312-* cp313-* cp314-*"
skip = "pp* *-musllinux_i686"
environment = { THORVG_ROOT = "thorvg" }
test-requires = ["pytest"]
test-command = "pytest {project}/tests -v"


[tool.cibuildwheel.linux]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_linux.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/linux_x86_64" }

[tool.cibuildwheel.macos]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_macos.sh {project}/thorvg
"""
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/macos_fat", MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-all = "{project}\\ci\\prepare_thorvg_windows.bat {project}"
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/windows_x64" }

[tool.cibuildwheel.ios]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_ios.sh {project}/thorvg
"""
xbuild-tools = ["ninja"]
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output/ios_arm64" }
test-sources = ["tests"]
test-command = "python -m pytest ./tests -v"

[tool.cibuildwheel.android]
before-all = """
    test -d {project}/thorvg || git clone https://github.com/psychowasp/thorvg.git {project}/thorvg
    bash {project}/tools/thorvg_scripts/build_android.sh {project}/thorvg
"""
# The host app (Gradle project) is responsible for providing libc++_shared.so.
# Skip cibuildwheel's default repair which tries to bundle it.
# repair-wheel-command = "cp {wheel} {dest_dir}/"
environment = { THORVG_ROOT = "thorvg", THORVG_LIB_DIR = "thorvg/output", ANDROID_API_LEVEL = "24" }
test-sources = ["tests"]
test-command = "python -m pytest ./tests -v"

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
