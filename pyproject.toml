[build-system]
requires = ["setuptools>=68", "Cython>=3.0"]
build-backend = "setuptools.build_meta"

[project]
name = "thorvg-cython"
version = "1.0.0"
description = "Cython bindings for the ThorVG vector graphics library"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
classifiers = [
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = ["pytest", "cibuildwheel"]

# ---------------------------------------------------------------------------
#  cibuildwheel configuration
# ---------------------------------------------------------------------------
[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "pp* *-musllinux_i686"
enable = ["cpython-ios"]

# build_all.sh builds thorvg once for every slice (runs once per CI runner)
before-all = "cd {project}/.. && bash build_all.sh"
environment = { THORVG_ROOT = ".." }

[tool.cibuildwheel.linux]
# Linux isn't covered by build_all.sh (Apple-only), so build inline
before-all = """
    cd {project}/.. && \
    pip install meson ninja && \
    meson setup builddir_linux --buildtype=release --default-library=static \
        -Dbindings=capi -Dloaders=svg,lottie,ttf && \
    ninja -C builddir_linux
"""
environment = { THORVG_ROOT = "..", THORVG_LIB_DIR = "../builddir_linux/src" }

[tool.cibuildwheel.macos]
# build_all.sh produces output/macos_fat/libthorvg.a
environment = { THORVG_ROOT = "..", THORVG_LIB_DIR = "../output/macos_fat", MACOSX_DEPLOYMENT_TARGET = "11.0" }

[tool.cibuildwheel.windows]
before-all = """
    cd /d {project}\\.. && \
    pip install meson ninja && \
    meson setup builddir_win --buildtype=release --default-library=static \
        -Dbindings=capi -Dloaders=svg,lottie,ttf && \
    ninja -C builddir_win
"""
environment = { THORVG_ROOT = "..", THORVG_LIB_DIR = "..\\builddir_win\\src" }

[tool.cibuildwheel.ios]
# build_all.sh produces output/ios_arm64/libthorvg.a
environment = { THORVG_ROOT = "..", THORVG_LIB_DIR = "../output/ios_arm64" }
